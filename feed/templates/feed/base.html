{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bandcamp Feed{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bc-teal': '#1da0c3',
                        'bc-teal-dark': '#148aa8',
                        'bc-cream': '#f5f0e6',
                        'bc-dark': '#111111',
                        'bc-gray': '#1a1a1a',
                        'bc-gray-light': '#2a2a2a',
                    },
                    fontFamily: {
                        'display': ['"DM Sans"', 'system-ui', 'sans-serif'],
                        'body': ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <link rel="stylesheet" href="{% static 'feed/css/main.css' %}">
</head>
<body class="font-body text-bc-cream antialiased" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>
    
    {% block content %}{% endblock %}
    
    <script src="{% static 'feed/js/toast.js' %}"></script>

    <!-- Persistent Audio Player -->
    <div id="audio-player" class="fixed bottom-0 inset-x-0 z-50 hidden">
        <div class="bg-bc-dark/60 backdrop-blur-xl border-t border-white/[0.06] px-4 py-2.5">
            <div class="max-w-7xl mx-auto flex items-center gap-3 sm:gap-4">
                <!-- Album Art + Info -->
                <div class="flex items-center gap-3 min-w-0 w-56 sm:w-80 shrink-0">
                    <img id="player-art" src="" alt="" class="w-10 h-10 rounded object-cover bg-bc-gray-light/50 flex-shrink-0">
                    <div class="min-w-0">
                        <p id="player-title" class="text-sm font-medium text-bc-cream/90 truncate"></p>
                        <p id="player-artist" class="text-xs text-bc-cream/40 truncate"></p>
                    </div>
                </div>

                <!-- Transport: Prev / Play-Pause / Next -->
                <div class="flex items-center gap-1 shrink-0">
                    <button id="player-prev" type="button" class="p-1.5 text-bc-cream/40 hover:text-bc-cream transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="player-playpause" type="button" class="flex-shrink-0 w-8 h-8 rounded-full bg-bc-teal hover:bg-bc-teal-dark flex items-center justify-center transition-colors">
                        <svg id="player-icon-play" class="w-4 h-4 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="player-icon-pause" class="w-4 h-4 text-white hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg id="player-icon-loading" class="w-4 h-4 text-white hidden animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    </button>
                    <button id="player-next" type="button" class="p-1.5 text-bc-cream/40 hover:text-bc-cream transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>

                <!-- Track counter -->
                <span id="player-track-counter" class="text-xs text-bc-cream/30 tabular-nums shrink-0 hidden">1/1</span>

                <!-- Progress -->
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <span id="player-time-current" class="text-xs text-bc-cream/35 tabular-nums w-10 text-right shrink-0">0:00</span>
                    <input id="player-progress" type="range" min="0" max="100" value="0" step="0.1" class="player-range flex-1">
                    <span id="player-time-total" class="text-xs text-bc-cream/35 tabular-nums w-10 shrink-0">0:00</span>
                </div>

                <!-- Close -->
                <button id="player-close" type="button" class="flex-shrink-0 p-1.5 rounded hover:bg-white/[0.06] text-bc-cream/30 hover:text-bc-cream/60 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <audio id="player-audio" preload="auto"></audio>
    </div>

    <script src="{% static 'feed/js/player.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
