<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bandcamp Feed{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bc-teal': '#1da0c3',
                        'bc-teal-dark': '#148aa8',
                        'bc-cream': '#f5f0e6',
                        'bc-dark': '#111111',
                        'bc-gray': '#1a1a1a',
                        'bc-gray-light': '#2a2a2a',
                    },
                    fontFamily: {
                        'display': ['"DM Sans"', 'system-ui', 'sans-serif'],
                        'body': ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <style>
        body {
            background-color: #111111;
            min-height: 100vh;
        }
        
        /* Album card hover effect */
        .album-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .album-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px -12px rgba(20, 184, 166, 0.3);
        }
        
        /* Loading spinner */
        .htmx-request .sync-icon {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Fade in animation for cards */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .album-card {
            animation: fadeInUp 0.4s ease forwards;
        }
        .album-card:nth-child(1) { animation-delay: 0.05s; }
        .album-card:nth-child(2) { animation-delay: 0.1s; }
        .album-card:nth-child(3) { animation-delay: 0.15s; }
        .album-card:nth-child(4) { animation-delay: 0.2s; }
        .album-card:nth-child(5) { animation-delay: 0.25s; }
        .album-card:nth-child(6) { animation-delay: 0.3s; }
        .album-card:nth-child(7) { animation-delay: 0.35s; }
        .album-card:nth-child(8) { animation-delay: 0.4s; }
        
        /* Toast notification */
        .toast {
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* Audio player range slider */
        .player-range {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 20px;
        }
        .player-range::-webkit-slider-runnable-track {
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .player-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #14b8a6;
            margin-top: -3.5px;
            transition: transform 0.15s ease;
        }
        .player-range:hover::-webkit-slider-thumb {
            transform: scale(1.3);
        }
        .player-range::-moz-range-track {
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .player-range::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: none;
            background: #14b8a6;
        }
        .player-range::-moz-range-progress {
            height: 3px;
            border-radius: 2px;
            background: #14b8a6;
        }
    </style>
</head>
<body class="font-body text-bc-cream antialiased" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>
    
    {% block content %}{% endblock %}
    
    <script>
        // Toast notification handler
        function showToast(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = isError 
                ? 'toast bg-red-500 text-white px-4 py-3 rounded-lg shadow-lg font-medium max-w-sm'
                : 'toast bg-bc-teal text-white px-4 py-3 rounded-lg shadow-lg font-medium max-w-sm';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        document.body.addEventListener('showToast', function(e) {
            const message = e.detail.value || e.detail;
            showToast(message, false);
        });
        
        // Handle HTMX errors globally
        document.body.addEventListener('htmx:responseError', function(e) {
            const status = e.detail.xhr.status;
            let message = 'Something went wrong. Please try again.';
            
            if (status === 403) {
                message = 'Request forbidden. Please refresh the page and try again.';
            } else if (status === 500) {
                message = 'Server error. Check your email credentials in .env file.';
            } else if (status === 0) {
                message = 'Network error. Please check your connection.';
            }
            
            showToast(message, true);
        });
        
        // Handle network errors
        document.body.addEventListener('htmx:sendError', function(e) {
            showToast('Network error. Please check your connection.', true);
        });
    </script>

    <!-- Persistent Audio Player -->
    <div id="audio-player" class="fixed bottom-0 inset-x-0 z-50 hidden">
        <div class="bg-bc-dark/60 backdrop-blur-xl border-t border-white/[0.06] px-4 py-2.5">
            <div class="max-w-7xl mx-auto flex items-center gap-3 sm:gap-4">
                <!-- Album Art + Info -->
                <div class="flex items-center gap-3 min-w-0 w-44 sm:w-52 shrink-0">
                    <img id="player-art" src="" alt="" class="w-10 h-10 rounded object-cover bg-bc-gray-light/50 flex-shrink-0">
                    <div class="min-w-0">
                        <p id="player-title" class="text-sm font-medium text-bc-cream/90 truncate"></p>
                        <p id="player-artist" class="text-xs text-bc-cream/40 truncate"></p>
                    </div>
                </div>

                <!-- Transport: Prev / Play-Pause / Next -->
                <div class="flex items-center gap-1 shrink-0">
                    <button id="player-prev" type="button" class="p-1.5 text-bc-cream/40 hover:text-bc-cream transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="player-playpause" type="button" class="flex-shrink-0 w-8 h-8 rounded-full bg-bc-teal hover:bg-bc-teal-dark flex items-center justify-center transition-colors">
                        <svg id="player-icon-play" class="w-4 h-4 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="player-icon-pause" class="w-4 h-4 text-white hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg id="player-icon-loading" class="w-4 h-4 text-white hidden animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    </button>
                    <button id="player-next" type="button" class="p-1.5 text-bc-cream/40 hover:text-bc-cream transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>

                <!-- Track counter -->
                <span id="player-track-counter" class="text-xs text-bc-cream/30 tabular-nums shrink-0 hidden">1/1</span>

                <!-- Progress -->
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <span id="player-time-current" class="text-xs text-bc-cream/35 tabular-nums w-10 text-right shrink-0">0:00</span>
                    <input id="player-progress" type="range" min="0" max="100" value="0" step="0.1" class="player-range flex-1">
                    <span id="player-time-total" class="text-xs text-bc-cream/35 tabular-nums w-10 shrink-0">0:00</span>
                </div>

                <!-- Close -->
                <button id="player-close" type="button" class="flex-shrink-0 p-1.5 rounded hover:bg-white/[0.06] text-bc-cream/30 hover:text-bc-cream/60 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <audio id="player-audio" preload="auto"></audio>
    </div>

    <script>
    (function() {
        const player       = document.getElementById('audio-player');
        const audio        = document.getElementById('player-audio');
        const artEl        = document.getElementById('player-art');
        const titleEl      = document.getElementById('player-title');
        const artistEl     = document.getElementById('player-artist');
        const playPauseBtn = document.getElementById('player-playpause');
        const iconPlay     = document.getElementById('player-icon-play');
        const iconPause    = document.getElementById('player-icon-pause');
        const iconLoading  = document.getElementById('player-icon-loading');
        const progress     = document.getElementById('player-progress');
        const timeCur      = document.getElementById('player-time-current');
        const timeTotal    = document.getElementById('player-time-total');
        const trackCounter = document.getElementById('player-track-counter');
        const prevBtn      = document.getElementById('player-prev');
        const nextBtn      = document.getElementById('player-next');
        const closeBtn     = document.getElementById('player-close');

        let currentReleaseId = null;
        let releaseName = '';
        let tracks = [];
        let currentTrackIndex = 0;
        let refreshAttempted = false;
        let isSeeking = false;

        function fmt(seconds) {
            if (!seconds || !isFinite(seconds)) return '0:00';
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function showIcon(which) {
            iconPlay.classList.add('hidden');
            iconPause.classList.add('hidden');
            iconLoading.classList.add('hidden');
            which.classList.remove('hidden');
        }

        function showPlayer() {
            player.classList.remove('hidden');
            document.body.style.paddingBottom = player.offsetHeight + 'px';
        }

        function hidePlayer() {
            audio.pause();
            audio.removeAttribute('src');
            player.classList.add('hidden');
            document.body.style.paddingBottom = '';
            currentReleaseId = null;
            tracks = [];
            syncCardButtons();
        }

        function getPlaylist() {
            var items = [];
            document.querySelectorAll('[data-release-id]').forEach(function(btn) {
                items.push({
                    id: parseInt(btn.getAttribute('data-release-id'), 10),
                    title: btn.getAttribute('data-title') || '',
                    artist: btn.getAttribute('data-artist') || '',
                    artUrl: btn.getAttribute('data-art') || ''
                });
            });
            return items;
        }

        function getAdjacentRelease(direction) {
            var playlist = getPlaylist();
            for (var i = 0; i < playlist.length; i++) {
                if (playlist[i].id === currentReleaseId) {
                    var target = i + direction;
                    if (target >= 0 && target < playlist.length) return playlist[target];
                    return null;
                }
            }
            return null;
        }

        function loadAndPlayRelease(entry) {
            refreshAttempted = false;
            currentReleaseId = entry.id;
            releaseName = entry.title;
            tracks = [];
            currentTrackIndex = 0;
            artistEl.textContent = entry.artist;
            artEl.src = entry.artUrl || '';
            titleEl.textContent = entry.title;
            trackCounter.classList.add('hidden');
            progress.value = 0;
            timeCur.textContent = '0:00';
            timeTotal.textContent = '0:00';
            showIcon(iconLoading);
            showPlayer();
            syncCardButtons();

            fetch('/stream/' + entry.id + '/')
                .then(function(r) {
                    if (!r.ok) throw new Error('Stream not available');
                    return r.json();
                })
                .then(function(data) {
                    tracks = data.tracks || [];
                    if (!tracks.length) throw new Error('No tracks');
                    currentTrackIndex = 0;
                    updateTrackDisplay();
                    audio.src = tracks[0].stream_url;
                    audio.play();
                })
                .catch(function() {
                    showToast('Could not load stream for this release.', true);
                    showIcon(iconPlay);
                    syncCardButtons();
                });
        }

        function updateTrackDisplay() {
            if (tracks.length <= 1) {
                trackCounter.classList.add('hidden');
                titleEl.textContent = releaseName;
            } else {
                trackCounter.classList.remove('hidden');
                trackCounter.textContent = (currentTrackIndex + 1) + '/' + tracks.length;
                titleEl.textContent = tracks[currentTrackIndex].title;
            }
        }

        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            currentTrackIndex = index;
            refreshAttempted = false;
            updateTrackDisplay();
            progress.value = 0;
            timeCur.textContent = '0:00';
            timeTotal.textContent = '0:00';
            audio.src = tracks[index].stream_url;
            audio.play();
        }

        function syncCardButtons() {
            document.querySelectorAll('[data-release-id]').forEach(function(btn) {
                var id = parseInt(btn.getAttribute('data-release-id'), 10);
                var playIcon = btn.querySelector('.card-icon-play');
                var pauseIcon = btn.querySelector('.card-icon-pause');
                if (!playIcon || !pauseIcon) return;
                if (id === currentReleaseId && !audio.paused) {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                } else {
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                }
            });
        }

        window.playRelease = function(id, title, artist, artUrl) {
            if (currentReleaseId === id && !audio.paused) {
                audio.pause();
                return;
            }
            if (currentReleaseId === id && audio.paused && audio.src) {
                audio.play();
                return;
            }
            loadAndPlayRelease({id: id, title: title, artist: artist, artUrl: artUrl});
        };

        playPauseBtn.addEventListener('click', function() {
            if (!audio.src) return;
            if (audio.paused) audio.play();
            else audio.pause();
        });

        prevBtn.addEventListener('click', function() {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                return;
            }
            if (currentTrackIndex > 0) {
                playTrack(currentTrackIndex - 1);
            } else {
                var prev = getAdjacentRelease(-1);
                if (prev) loadAndPlayRelease(prev);
                else audio.currentTime = 0;
            }
        });

        nextBtn.addEventListener('click', function() {
            if (currentTrackIndex < tracks.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                var next = getAdjacentRelease(1);
                if (next) loadAndPlayRelease(next);
            }
        });

        audio.addEventListener('play', function() { showIcon(iconPause); syncCardButtons(); });
        audio.addEventListener('pause', function() { showIcon(iconPlay); syncCardButtons(); });

        audio.addEventListener('timeupdate', function() {
            if (isSeeking || !audio.duration) return;
            progress.value = (audio.currentTime / audio.duration) * 100;
            timeCur.textContent = fmt(audio.currentTime);
            timeTotal.textContent = fmt(audio.duration);
        });

        audio.addEventListener('loadedmetadata', function() {
            timeTotal.textContent = fmt(audio.duration);
        });

        audio.addEventListener('ended', function() {
            if (currentTrackIndex < tracks.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                var next = getAdjacentRelease(1);
                if (next) {
                    loadAndPlayRelease(next);
                } else {
                    showIcon(iconPlay);
                    progress.value = 0;
                    timeCur.textContent = '0:00';
                    syncCardButtons();
                }
            }
        });

        progress.addEventListener('mousedown', function() { isSeeking = true; });
        progress.addEventListener('touchstart', function() { isSeeking = true; }, {passive: true});
        progress.addEventListener('input', function() {
            if (audio.duration) timeCur.textContent = fmt((progress.value / 100) * audio.duration);
        });
        progress.addEventListener('change', function() {
            if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
            isSeeking = false;
        });

        audio.addEventListener('error', function() {
            if (!currentReleaseId) return;
            if (refreshAttempted) {
                showToast('Could not play this track.', true);
                showIcon(iconPlay);
                syncCardButtons();
                return;
            }
            refreshAttempted = true;
            showIcon(iconLoading);

            fetch('/stream/' + currentReleaseId + '/?refresh=1')
                .then(function(r) {
                    if (!r.ok) throw new Error('refresh failed');
                    return r.json();
                })
                .then(function(data) {
                    tracks = data.tracks || [];
                    if (!tracks.length) throw new Error('No tracks');
                    if (currentTrackIndex >= tracks.length) currentTrackIndex = 0;
                    updateTrackDisplay();
                    audio.src = tracks[currentTrackIndex].stream_url;
                    audio.play();
                })
                .catch(function() {
                    showToast('Could not play this track.', true);
                    showIcon(iconPlay);
                    syncCardButtons();
                });
        });

        closeBtn.addEventListener('click', hidePlayer);

        document.body.addEventListener('htmx:afterSwap', syncCardButtons);
    })();
    </script>
</body>
</html>
