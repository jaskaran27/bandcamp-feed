<button
    type="button"
    class="favourite-btn inline-flex items-center justify-center flex-shrink-0 w-3.5 h-3.5 transition-all hover:scale-125 {% if is_favourite %}text-yellow-400{% else %}text-bc-cream/30 hover:text-bc-cream/60{% endif %}"
    hx-post="{% url 'feed:toggle_favourite' %}"
    hx-vals='{"uploader": "{{ uploader|escapejs }}", "artist": "{{ artist|escapejs }}"}'
    hx-swap="outerHTML"
    hx-trigger="click"
    onclick="event.preventDefault(); event.stopPropagation();"
    title="{% if is_favourite %}Remove {{ artist|default:uploader }} from favourites{% else %}Add {{ artist|default:uploader }} to favourites{% endif %}"
>
    {% if is_favourite %}
    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    {% else %}
    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    {% endif %}
</button>
